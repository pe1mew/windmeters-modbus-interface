; PlatformIO Project Configuration File
;
; debug_uart HIL test shell — CH32V003J4M6, ch32v003fun framework, flashed
; over the 1-wire SDI interface with a WCH-LinkE probe. Cloned from
; software/drivers/blinky_template per design/driverDevelopment.md §2.1.

[env:genericCH32V003J4M6]
platform      = ch32v
board         = genericCH32V003J4M6
framework     = ch32v003fun

upload_protocol = wch-link

; Shared driver-phase libraries (debug_uart lives here).
lib_extra_dirs = ../common

; PD6 debug UART speed (design/driverDevelopment.md §2.2).
monitor_speed = 115200
