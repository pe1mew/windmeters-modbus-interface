; PlatformIO Project Configuration File
;
; Wind speed driver (TIM2 ETR pulse counting on PC1) + HIL test shell.
; CH32V003J4M6, ch32v003fun framework, WCH-LinkE over SDI. Cloned from
; software/drivers/blinky_template per design/driverDevelopment.md §2.1/§3.

[env:genericCH32V003J4M6]
platform      = ch32v
board         = genericCH32V003J4M6
framework     = ch32v003fun

upload_protocol = wch-link

; Shared driver-phase libraries (debug_uart). The ws driver itself lives in
; this project's lib/ folder.
lib_extra_dirs = ../common

; PD6 debug UART speed (design/driverDevelopment.md §2.2).
monitor_speed = 115200
