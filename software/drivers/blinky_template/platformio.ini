; PlatformIO Project Configuration File
;
; Bare CH32V003J4M6 (SOP-8) blinky, built with the ch32v003fun framework and
; flashed over the 1-wire SDI interface with a WCH-LinkE probe.
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:genericCH32V003J4M6]
platform      = ch32v
board         = genericCH32V003J4M6
framework     = ch32v003fun

; WCH-LinkE over SDI (single-wire debug on PD1). This is the board default,
; stated explicitly here for clarity.
upload_protocol = wch-link

; Serial monitor speed (only relevant once you add printf/UART output).
monitor_speed = 115200
