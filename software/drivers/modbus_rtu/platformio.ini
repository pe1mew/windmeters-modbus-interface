; PlatformIO Project Configuration File
;
; Modbus RTU slave driver (USART1 half-duplex on PD6, DE/RE on PC2) + HIL
; test shell. CH32V003J4M6, ch32v003fun framework, WCH-LinkE over SDI.
; Cloned from software/drivers/blinky_template per design/driverDevelopment.md.

[env:genericCH32V003J4M6]
platform      = ch32v
board         = genericCH32V003J4M6
framework     = ch32v003fun

upload_protocol = wch-link

; Shared driver-phase libraries. The mb driver itself lives in this
; project's lib/ folder.
lib_extra_dirs = ../common
