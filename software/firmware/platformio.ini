; PlatformIO project for the windmeter Modbus interface
; Target MCU: CH32V003J4M6 (RISC-V, SOIC-8, 16KB flash / 2KB RAM)
;
; The CH32V003 family is supported by the community WCH platform:
;   https://github.com/Community-PIO-CH32V/platform-ch32v
;
; Hardware is identical for both sensor variants; only the firmware build
; differs (see design/scratchBook.md). Two build environments select the
; sensor type at compile time via the SENSOR_* define.
;
; Flash with a WCH-LinkE on the SWIO pin (PD1).

[platformio]
default_envs = wind_speed
src_dir = src

[env]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
board = genericCH32V003J4M6
framework = noneos-sdk

; WCH-LinkE programmer/debugger
upload_protocol = wch-link
debug_tool = wch-link

monitor_speed = 9600

build_flags =
    -Os
    -Wall
    -Wextra

[env:wind_speed]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_SPEED

[env:wind_direction]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_DIRECTION
