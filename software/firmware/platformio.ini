; PlatformIO project for the windmeter Modbus interface — product firmware.
; Target MCU: CH32V003J4M6 (RISC-V, SOIC-8, 16KB flash / 2KB RAM)
;
; Framework: ch32v003fun — the framework every driver library was developed
; and HIL-verified on (design/integrationPlan.md §3). One source tree, two
; build environments selecting the sensor variant at compile time (TDS
; FR-S01/FR-S02).
;
; Driver libraries are referenced IN PLACE from software/drivers/ — no
; copies (integrationPlan.md §3). Flash with a WCH-LinkE on SWIO (PD1).

[platformio]
default_envs = wind_speed
src_dir = src

[env]
platform      = ch32v
board         = genericCH32V003J4M6
framework     = ch32v003fun
upload_protocol = wch-link

; NFR-RES01 ceilings as hard build gates: 87.5% of 16K flash / 2K RAM.
board_upload.maximum_size = 14336
board_upload.maximum_ram_size = 1792

; Verified driver libraries, referenced in place.
lib_extra_dirs =
    ../drivers/common
    ../drivers/wind_speed/lib
    ../drivers/wind_direction/lib
    ../drivers/modbus_rtu/lib

build_flags =
    -Os
    -Wall
    -Wextra

[env:wind_speed]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_SPEED

[env:wind_direction]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_DIRECTION

; Combined variant (integrationPlan.md §10): one slave serves both sensors.
; build byte 0x03, address 32 (jumper open) / 37 (bridged). The direction
; raw-ADC diagnostic moves from 30005 to 30013 since 30005 carries the
; speed pulse count here.
[env:wind_combined]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_COMBINED

; Test builds: TEST_HOOKS adds the FR-S20 watchdog hang trigger (holding
; 0x00FF, magic 0xDEAD). NEVER release these binaries.
[env:wind_speed_test]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_SPEED
    -D TEST_HOOKS

[env:wind_direction_test]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_DIRECTION
    -D TEST_HOOKS

[env:wind_combined_test]
build_flags =
    ${env.build_flags}
    -D SENSOR_WIND_COMBINED
    -D TEST_HOOKS
